name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Read version
        id: version
        run: echo "version=$(cat version.txt | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Check if version changed
        id: check
        run: |
          if git diff HEAD~1 -- version.txt | grep -q '^[+-][0-9]'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Typecheck
        working-directory: web
        run: bun run typecheck

      - name: Build frontend
        working-directory: web
        run: bun run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/
          retention-days: 7

  build-docs:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install docs dependencies
        working-directory: docs
        run: bun install

      - name: Build VitePress
        working-directory: docs
        run: bun run build

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: docs/.vitepress/dist/
          retention-days: 7

  deploy-docs:
    name: Deploy Docs
    needs: build-docs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: docs-dist

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    name: Release
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.build.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist/

      - name: Create release zip
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          ZIP_NAME="gcphone-next-v${VERSION}.zip"

          zip -r "$ZIP_NAME" \
            fxmanifest.lua \
            shared/ \
            client/ \
            server/ \
            web/dist/ \
            '[gcphone_sounds]/' \
            CHANGELOG.md \
            LICENSE.md \
            -x "*.git*" \
            -x "version.txt" \
            -x "*.local*" \
            -x "docs/*"

          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Extract changelog for this version
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "Release v${VERSION}" > release_notes.md
          fi

      - name: Create tag and release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: gcphone-next v${{ env.VERSION }}
          body_path: release_notes.md
          files: ${{ env.ZIP_NAME }}
          draft: false
          prerelease: false
